# The following is the order of the links in the header of the website.
#
# Changing the order here will adjust the order and you can also add additional
# links. Removing a link prevents it from showing in the header, but does not
# prevent it from being included in the site. Commented-out entries below are
# kept for reference so they can be re-enabled by uncommenting.

main:
  - title: "About"
    url: /

  - title: "Research"
    url: /research/

  - title: "Teaching"
    url: /teaching/

  - title: "CV"
    url: /cv/

  # Talks page exists at /talks/ but is hidden from the header until the site
